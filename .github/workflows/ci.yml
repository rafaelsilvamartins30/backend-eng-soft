name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Descarte-Eletronico

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Docker
        run: docker info

      - name: Run tests
        run: ./mvnw test
