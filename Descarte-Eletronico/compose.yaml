services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-descarte-eletronico-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-descarte_eletronico}
      POSTGRES_USER: ${POSTGRES_USER:-descarte}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-descarte}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
