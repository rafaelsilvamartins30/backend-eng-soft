spring:
  application:
    name: Descarte-Eletronico
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:descarte_eletronico}}
    username: ${DB_USERNAME:descarte}
    password: ${DB_PASSWORD:descarte}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
